<!DOCTYPE html>
<html>
<head>

<title>Pull Request Dashboard</title>

<style>

body{
    font-family: Arial;
    margin:40px;
}

input{
    padding:8px;
    margin-right:10px;
}

button{
    padding:8px 12px;
    cursor:pointer;
}

table{
    border-collapse: collapse;
    width:80%;
    margin-top:20px;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
}

th{
    background:#f2f2f2;
}

</style>

</head>

<body>

<h1>Pull Request Dashboard</h1>

<!-- 🔥 New Input Form -->
<h2>Enter GitHub Repository</h2>

<form method="POST">
    <input type="text" name="owner" placeholder="GitHub Username" required>
    <input type="text" name="repo" placeholder="Repository Name" required>
    <button type="submit">Fetch PRs</button>
</form>

<hr>

<h3>Total Open Pull Requests: {{ total_prs }}</h3>

<table>

<tr>
<th>PR Number</th>
<th>Title</th>
<th>Author</th>
<th>Status</th>
</tr>

{% for pr in pulls %}

<tr>
<td>{{ pr.number }}</td>
<td>{{ pr.title }}</td>
<td>{{ pr.user.login }}</td>
<td>{{ pr.state }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
