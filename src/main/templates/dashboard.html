<!DOCTYPE html>
<html>
<head>

<title>Pull Request Dashboard</title>

<style>

body{
font-family: Arial;
margin:40px;
}

table{
border-collapse: collapse;
width:80%;
}

th, td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#f2f2f2;
}

</style>

</head>

<body>

<h1>Pull Request Dashboard</h1>

<h3>Total Open Pull Requests: {{ total_prs }}</h3>

<table>

<tr>
<th>PR Number</th>
<th>Title</th>
<th>Author</th>
<th>Status</th>
</tr>

{% for pr in prs %}

<tr>
<td>{{ pr.number }}</td>
<td>{{ pr.title }}</td>
<td>{{ pr.user.login }}</td>
<td>{{ pr.state }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
